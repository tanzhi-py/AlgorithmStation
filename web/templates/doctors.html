<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线医生 - 中医知识图谱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename='bg3.jpg') }}");
            background-size: cover;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .doctor-card {
            transition: transform 0.2s;
        }
        .doctor-card:hover {
            transform: translateY(-5px);
        }
        .btn-available {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
        }
        .btn-unavailable {
            background: #6c757d;
            border: none;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body>
    {% include '_navbar.html' %}

    <div class="container mt-4">
        <h2><i class="fas fa-user-md"></i> 在线医生</h2>
        <div class="row" id="doctorsList">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 中医知识图谱系统 | 智能问诊助手</p>
    </div>

    <script>
        async function loadDoctors() {
            try {
                const res = await fetch('/api/doctors');
                const doctors = await res.json();
                const container = document.getElementById('doctorsList');
                container.innerHTML = '';
                if (doctors.length === 0) {
                    container.innerHTML = '<div class="col-12 text-muted">暂无医生信息</div>';
                    return;
                }
                for (const doc of doctors) {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4 mb-4 doctor-card';
                    col.innerHTML = `
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">${escapeHtml(doc.name)}</h5>
                                <p class="card-text"><strong>领域：</strong>${escapeHtml(doc.specialty)}</p>
                                <p class="card-text"><strong>上班时间：</strong>${doc.work_start} - ${doc.work_end}</p>
                                <p class="card-text">${escapeHtml(doc.description || '')}</p>
                            </div>
                            <div class="card-footer bg-transparent">
                                ${doc.is_available ?
                                    `<a href="/doctor_chat/${doc.id}" class="btn btn-available w-100">进入聊天</a>` :
                                    `<button class="btn btn-unavailable w-100" disabled>暂未上班</button>`
                                }
                            </div>
                        </div>
                    `;
                    container.appendChild(col);
                }
            } catch (err) {
                console.error(err);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadDoctors();
    </script>
</body>
</html>
