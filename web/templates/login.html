<!DOCTYPE html>
<html>
<head>
    <title>登录 - 中医知识图谱</title>
    <!-- Font Awesome 图标库  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 保留 Bootstrap 用于部分布局和响应式 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-image: url("{{ url_for('static', filename='bg3.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 15px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 820px; /* 增宽以容纳左右两列 */
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            overflow: hidden;
            column-gap: 20px; /* 增加左右列之间的间距 */
        }

        /* 左侧登录表单列 */
        .login-left {
            box-sizing: border-box;
            flex: 1.1; /* 微调比例，为间距腾出空间 */
            padding: 40px 0 40px 35px;
            min-width: 280px;
        }

        /* 右侧渐变注册框架 */
        .login-right {
            flex: 0.9; /* 保持比例或微调 */
            background: url("{{ url_for('static', filename='bg5.jpg') }}") no-repeat center center;
            border-radius: 28px;
            margin: 25px 25px 25px 0; /* 移除外边距，改用 column-gap */
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            box-shadow: 0 15px 30px -8px rgba(32, 201, 151, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(2px);
            transition: transform 0.2s;
        }

        .login-right:hover {
            transform: scale(1.01);
        }

        /* 右侧内部元素 */
        .login-right h3 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5); /* 增强阴影 */
            letter-spacing: 1px;
        }

        .login-right p {
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.5); /* 为描述文字添加阴影 */
        }

        .join-link {
            font-size: 24px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 14px 28px;
            border-radius: 60px;
            color: white;
            text-decoration: none;
            margin: 20px 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 260px;
            transition: all 0.3s;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .join-link:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.02);
            border-color: white;
            color: white;
        }

        /* 注册按钮 */
        .signup-link {
            font-size: 22px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            padding: 12px 28px; /* 稍微加大内边距 */
            border-radius: 40px;
            background: linear-gradient(135deg, #8aeaa0, #98e6ce); /* 绿色渐变 */
            border: none; /* 去掉半透明白色边框 */
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2); /* 增加阴影 */
        }

        .signup-link:hover {
            background: linear-gradient(135deg, #2ecc71, #28a745); /* 悬停渐变微调 */
            transform: scale(1.02);
            gap: 15px; /* 箭头轻微移动感 */
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .signup-link i {
            font-size: 20px;
        }

        .watermark-note {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            width: 100%;
            text-align: right;
            font-style: italic;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 700;
            text-align: left;
            color: #1e3c2c;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .sub-title {
            text-align: left;
            font-size: 18px;
            color: #2b5e3b;
            margin-bottom: 30px;
            font-weight: 400;
            opacity: 0.9;
        }

        /* 输入框容器 (完全保留原有风格) */
        .input-group-custom {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group-custom i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c8c6f;
            font-size: 18px;
            z-index: 2;
        }

        .input-group-custom input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 40px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
            outline: none;
        }

        .input-group-custom input:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.15);
            background: #ffffff;
        }

        /* 记住我和忘记密码行 */
        .row-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0 28px;
            font-size: 15px;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2b4f2e;
            cursor: pointer;
        }

        .remember-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #28a745;
            cursor: pointer;
        }

        .forgot-link a {
            color: #28a745;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link a:hover {
            color: #1e7e34;
            text-decoration: underline;
        }

        /* 登录按钮 */
        .btn-login {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 18px rgba(32, 201, 151, 0.3);
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 24px rgba(32, 201, 151, 0.4);
            background: linear-gradient(135deg, #2ecc71, #28a745);
        }

        /* 自定义错误提示 */
        .custom-alert {
            background: rgba(248, 215, 218, 0.9);
            backdrop-filter: blur(5px);
            color: #721c24;
            padding: 14px 20px;
            border-radius: 40px;
            margin-bottom: 25px;
            font-size: 15px;
            border: 1px solid #f5c6cb;
            position: relative;
            padding-right: 45px;
        }

        .custom-alert .btn-close-custom {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            color: #721c24;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .custom-alert .btn-close-custom:hover {
            opacity: 1;
        }


        @media (max-width: 700px) {
            .login-card {
                flex-direction: column;
            }

            .login-left {
                padding: 35px 25px 20px 25px;
            }

            .login-right {
                margin: 0 20px 30px 20px;
                width: auto;
                border-radius: 28px;
            }

            .brand-title, .sub-title {
                text-align: center;
            }
        }

        /* 确保左侧表单不溢出 */
        .login-left form {
            width: 100%;
        }

        hr {
            display: none;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <!-- 左侧：完整的登录表单 -->
        <div class="login-left">
            <h1 class="brand-title">🏥 中医问答平台</h1>
            <h2 class="sub-title">用户登录</h2>

            <!-- 错误消息显示区 -->
            {% if error %}
                <div class="custom-alert" role="alert">
                    {{ error }}
                    <button type="button" class="btn-close-custom" data-bs-dismiss="alert" aria-label="Close">&times;
                    </button>
                </div>
            {% endif %}

            <!-- 登录表  -->
            <form method="post">
                <!-- 用户名输入框 -->
                <div class="input-group-custom">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="用户名" required>
                </div>
                <!-- 密码输入框 -->
                <div class="input-group-custom">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="密码" required>
                </div>

                <!-- 登录按钮 -->
                <button type="submit" class="btn-login">登 录</button>

            </form>
        </div>

        <div class="login-right">
            <h3>还没有账号吗?</h3>
            <p>点击下方按钮，加入我们</p>
            <a href="{{ url_for('register') }}" class="signup-link">
                SIGN UP <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- 手动关闭自定义弹窗的脚本 -->
<script>
    document.querySelectorAll('.btn-close-custom').forEach(btn => {
        btn.addEventListener('click', function (e) {
            this.closest('.custom-alert').style.display = 'none';
        });
    });
</script>
</body>
</html>
