<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>与 {{ doctor.name }} 医生交流</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            background-image: url("{{ url_for('static', filename='bg3.jpg') }}");
            background-size: cover;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chat-container {
            height: 70vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.9);
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .doctor-message {
            justify-content: flex-start;
        }
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            background: #e9ecef;
        }
        .user-message .message-content {
            background: #007bff;
            color: white;
        }
        .doctor-message .message-content {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
        }
        .input-area {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .input-area textarea {
            flex: 1;
        }
    </style>
</head>
<body>
    {% include '_navbar.html' %}

    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-light">
                <h4><i class="fas fa-user-md"></i> {{ doctor.name }} 医生</h4>
                <small>{{ doctor.specialty }} | 上班时间：{{ doctor.work_start.strftime('%H:%M') }} - {{ doctor.work_end.strftime('%H:%M') }}</small>
            </div>
            <div class="card-body">
                <div class="chat-container" id="chatContainer">
                    <div class="text-center text-muted">连接中...</div>
                </div>
                <div class="input-area">
                    <textarea id="messageInput" class="form-control" rows="2" placeholder="输入您的问题..."></textarea>
                    <button id="sendBtn" class="btn btn-primary" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> 发送
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const doctorId = {{ doctor.id }};
        const userId = {{ current_user.id }};
        const socket = io();
        let room = `doctor_${doctorId}_user_${userId}`;

        socket.emit('join_doctor_room', { doctor_id: doctorId, user_id: userId });

        socket.on('new_message', (data) => {
            addMessage(data.message, data.sender, data.timestamp);
        });

        socket.on('connect', () => console.log('WebSocket connected'));

        function addMessage(text, sender, timestamp) {
            const container = document.getElementById('chatContainer');
            if (container.children.length === 1 && container.children[0].innerText.includes('连接中')) {
                container.innerHTML = '';
            }
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'user' ? 'user-message' : 'doctor-message'}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const timeStr = new Date(timestamp).toLocaleTimeString();
            contentDiv.innerHTML = `<div>${escapeHtml(text)}</div><small class="text-muted">${timeStr}</small>`;
            msgDiv.appendChild(contentDiv);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            socket.emit('send_message', {
                doctor_id: doctorId,
                message: text
            });
            input.value = '';
            input.focus();
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
